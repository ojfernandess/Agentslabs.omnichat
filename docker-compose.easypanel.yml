# Opcional: como docker-compose.yml, com VITE_DEPLOYMENT_MODE default = easypanel.
# O painel usa por defeito docker-compose.yml (na raiz) — já com context . e Dockerfile corretos.
# No Easypanel: em Docker Compose → nome do ficheiro, pode definir explicitamente
# `docker-compose.easypanel.yml` se não quiser o default `docker-compose.yml`.
#
# Repositório: https://github.com/ojfernandess/Agentslabs.omnichat
# Ver: deploy/EASYPANEL_GITHUB.md, deploy/easypanel.env.example

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY:-}
        VITE_SUPABASE_FUNCTIONS_URL: ${VITE_SUPABASE_FUNCTIONS_URL:-}
        VITE_DEPLOYMENT_MODE: ${VITE_DEPLOYMENT_MODE:-easypanel}
        META_APP_ID: ${META_APP_ID:-}
        VITE_PUBLIC_APP_URL: ${VITE_PUBLIC_APP_URL:-}
        VITE_INTERNAL_HOOK_SECRET: ${VITE_INTERNAL_HOOK_SECRET:-}
        VITE_EXTERNAL_MEDIA_STORAGE: ${VITE_EXTERNAL_MEDIA_STORAGE:-}
        VITE_EXTERNAL_MEDIA_UPLOAD_URL: ${VITE_EXTERNAL_MEDIA_UPLOAD_URL:-}
    expose:
      - "80"
    labels:
      org.opencontainers.image.source: "https://github.com/ojfernandess/Agentslabs.omnichat"
      org.opencontainers.image.title: "Agentslabs Omni Chat"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  db-init:
    profiles:
      - migrate
    build:
      context: .
      dockerfile: Dockerfile.db-init
    environment:
      DATABASE_URL: ${DATABASE_URL:-}
    restart: "no"
