# Versão para Easypanel / CI: ficheiro na RAIZ do repositório.
# context: . → encontra ./Dockerfile (o compose em deploy/ usa context: .. e falha se o painel não mantiver a pasta deploy/).
#
# No Easypanel: Compose file path = docker-compose.easypanel.yml (raiz do clone), não deploy/docker-compose.easypanel.yml
#
# Repositório: https://github.com/ojfernandess/Agentslabs.omnichat
#
# Ver também: deploy/EASYPANEL_GITHUB.md, deploy/easypanel.env.example

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY:-}
        VITE_SUPABASE_FUNCTIONS_URL: ${VITE_SUPABASE_FUNCTIONS_URL:-}
        VITE_DEPLOYMENT_MODE: ${VITE_DEPLOYMENT_MODE:-easypanel}
        META_APP_ID: ${META_APP_ID:-}
        VITE_PUBLIC_APP_URL: ${VITE_PUBLIC_APP_URL:-}
        VITE_INTERNAL_HOOK_SECRET: ${VITE_INTERNAL_HOOK_SECRET:-}
        VITE_EXTERNAL_MEDIA_STORAGE: ${VITE_EXTERNAL_MEDIA_STORAGE:-}
        VITE_EXTERNAL_MEDIA_UPLOAD_URL: ${VITE_EXTERNAL_MEDIA_UPLOAD_URL:-}
    ports:
      - "${WEB_PORT:-8080}:80"
    labels:
      org.opencontainers.image.source: "https://github.com/ojfernandess/Agentslabs.omnichat"
      org.opencontainers.image.title: "Agentslabs Omni Chat"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  db-init:
    profiles:
      - migrate
    build:
      context: .
      dockerfile: Dockerfile.db-init
    environment:
      DATABASE_URL: ${DATABASE_URL:-}
    restart: "no"
