server {
    # 80: padrão. 8080: alguns painéis (ex. Easypanel) usam "proxy port" 8080 por defeito —
    # se o domínio não abrir, confira Domains → porta do proxy = 80 ou 8080.
    listen 80;
    listen [::]:80;
    listen 8080;
    listen [::]:8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Ficheiros estáticos na raiz (evita fallback para index.html com MIME errado)
    location = /favicon.ico {
        access_log off;
        log_not_found off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files /favicon.ico =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }
}
