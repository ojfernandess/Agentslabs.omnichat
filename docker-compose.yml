# Ficheiro padrão: `docker compose up` local e Easypanel (usa este nome: docker-compose.yml).
# Build: context = raiz do repo → ./Dockerfile (obrigatório existir).
# IMPORTANTE: use sempre `context: .` aqui. NÃO copie deploy/docker-compose.easypanel.yml para a raiz
# sem alterar `context: ..` → `context: .` (senão o build procura Dockerfile fora do repo).
#
# Easypanel: não altere para outro path sem copiar também o Dockerfile para o contexto.
# Repositório: https://github.com/ojfernandess/Agentslabs.omnichat
#
# Ver: deploy/EASYPANEL_GITHUB.md, docker-compose.easypanel.yml (cópia equivalente)

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY:-}
        VITE_SUPABASE_FUNCTIONS_URL: ${VITE_SUPABASE_FUNCTIONS_URL:-}
        VITE_DEPLOYMENT_MODE: ${VITE_DEPLOYMENT_MODE:-supabase}
        META_APP_ID: ${META_APP_ID:-}
        VITE_META_EMBEDDED_CONFIG_ID: ${VITE_META_EMBEDDED_CONFIG_ID:-}
        VITE_PUBLIC_APP_URL: ${VITE_PUBLIC_APP_URL:-}
        VITE_INTERNAL_HOOK_SECRET: ${VITE_INTERNAL_HOOK_SECRET:-}
        VITE_EXTERNAL_MEDIA_STORAGE: ${VITE_EXTERNAL_MEDIA_STORAGE:-}
        VITE_EXTERNAL_MEDIA_UPLOAD_URL: ${VITE_EXTERNAL_MEDIA_UPLOAD_URL:-}
    # Sem `ports` no host: o Easypanel usa proxy interno — ver deploy/EASYPANEL_GITHUB.md §0c.
    # Local: `docker compose -f docker-compose.yml -f docker-compose.local.yml up -d`
    expose:
      - "80"
      - "8080"
    labels:
      org.opencontainers.image.source: "https://github.com/ojfernandess/Agentslabs.omnichat"
      org.opencontainers.image.title: "Agentslabs Omni Chat"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  db-init:
    profiles:
      - migrate
    build:
      context: .
      dockerfile: Dockerfile.db-init
    environment:
      DATABASE_URL: ${DATABASE_URL:-}
    restart: "no"
