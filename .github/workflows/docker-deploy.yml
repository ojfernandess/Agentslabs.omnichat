# Build da imagem (GHCR) + migrações Supabase opcionais.
# Uso típico: Easypanel puxa ghcr.io/<org>/<repo>:latest ou :sha.
#
# Secrets (Settings → Secrets and variables → Actions):
#   Build Vite (recomendado):
#     VITE_SUPABASE_URL
#     VITE_SUPABASE_PUBLISHABLE_KEY
#   Opcionais (alinhados com deploy/docker-compose.easypanel.yml / Dockerfile):
#     VITE_SUPABASE_FUNCTIONS_URL
#     VITE_DEPLOYMENT_MODE          (ex.: easypanel)
#     META_APP_ID, VITE_PUBLIC_APP_URL, VITE_INTERNAL_HOOK_SECRET
#     VITE_EXTERNAL_MEDIA_STORAGE, VITE_EXTERNAL_MEDIA_UPLOAD_URL
#
# Migrações (job migrate — pode saltar no workflow manual):
#     SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_REF
#     SUPABASE_DB_PASSWORD (opcional, se o link pedir)

name: Docker (GHCR) e migrações Supabase

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_migrate:
        description: "Apenas build/push da imagem (sem supabase db push)"
        required: false
        default: false
        type: boolean

concurrency:
  group: docker-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  migrate:
    name: Migrações (supabase db push)
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.skip_migrate != true }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link ao projeto e aplicar migrações
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_PROJECT_REF:-}" ] || [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "::error::Defina os secrets SUPABASE_PROJECT_REF e SUPABASE_ACCESS_TOKEN no repositório."
            exit 1
          fi
          if [ -n "${SUPABASE_DB_PASSWORD:-}" ]; then
            supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"
          else
            supabase link --project-ref "$SUPABASE_PROJECT_REF"
          fi
          # --include-all: reaplica migrações quando o ficheiro local diverge do histórico remoto
          # (ex.: 20260322210000_webhook_ingest_campaign_queues.sql após push inicial).
          supabase db push --include-all

  docker:
    name: Build e push imagem (Dockerfile raiz)
    runs-on: ubuntu-latest
    needs: migrate
    if: ${{ always() && (needs.migrate.result == 'success' || needs.migrate.result == 'skipped') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Build e push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
            VITE_SUPABASE_FUNCTIONS_URL=${{ secrets.VITE_SUPABASE_FUNCTIONS_URL }}
            VITE_DEPLOYMENT_MODE=${{ secrets.VITE_DEPLOYMENT_MODE }}
            META_APP_ID=${{ secrets.META_APP_ID }}
            VITE_PUBLIC_APP_URL=${{ secrets.VITE_PUBLIC_APP_URL }}
            VITE_INTERNAL_HOOK_SECRET=${{ secrets.VITE_INTERNAL_HOOK_SECRET }}
            VITE_EXTERNAL_MEDIA_STORAGE=${{ secrets.VITE_EXTERNAL_MEDIA_STORAGE }}
            VITE_EXTERNAL_MEDIA_UPLOAD_URL=${{ secrets.VITE_EXTERNAL_MEDIA_UPLOAD_URL }}
