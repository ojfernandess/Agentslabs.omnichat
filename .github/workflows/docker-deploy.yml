# Migrações no Supabase (remoto) + imagem Docker no GHCR.
#
# Secrets (Settings → Secrets and variables → Actions):
#   Obrigatórios para migrações:
#     SUPABASE_ACCESS_TOKEN   https://supabase.com/dashboard/account/tokens
#     SUPABASE_PROJECT_REF    Settings → General → Reference ID
#   Opcional se o CLI pedir password ao linkar:
#     SUPABASE_DB_PASSWORD    Settings → Database
#
#   Obrigatórios para build Vite (embute no bundle):
#     VITE_SUPABASE_URL
#     VITE_SUPABASE_PUBLISHABLE_KEY
#
#   Opcionais (Meta / URLs públicas):
#     VITE_META_APP_ID, VITE_PUBLIC_APP_URL, VITE_META_OAUTH_REDIRECT_URI,
#     VITE_META_EMBEDDED_SIGNUP_CONFIG_ID, VITE_META_GRAPH_VERSION,
#     VITE_META_EMBEDDED_TOKEN_REDIRECT_URI, VITE_INTERNAL_HOOK_SECRET

name: Docker e migrações Supabase

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: docker-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  migrate:
    name: Migrações (supabase db push)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link ao projeto e aplicar migrações
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_PROJECT_REF:-}" ] || [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "::error::Defina os secrets SUPABASE_PROJECT_REF e SUPABASE_ACCESS_TOKEN no repositório."
            exit 1
          fi
          if [ -n "${SUPABASE_DB_PASSWORD:-}" ]; then
            supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"
          else
            supabase link --project-ref "$SUPABASE_PROJECT_REF"
          fi
          supabase db push

  docker:
    name: Build e push imagem
    runs-on: ubuntu-latest
    needs: migrate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Build e push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
            VITE_META_APP_ID=${{ secrets.VITE_META_APP_ID }}
            VITE_PUBLIC_APP_URL=${{ secrets.VITE_PUBLIC_APP_URL }}
            VITE_META_OAUTH_REDIRECT_URI=${{ secrets.VITE_META_OAUTH_REDIRECT_URI }}
            VITE_META_EMBEDDED_SIGNUP_CONFIG_ID=${{ secrets.VITE_META_EMBEDDED_SIGNUP_CONFIG_ID }}
            VITE_META_GRAPH_VERSION=${{ secrets.VITE_META_GRAPH_VERSION }}
            VITE_META_EMBEDDED_TOKEN_REDIRECT_URI=${{ secrets.VITE_META_EMBEDDED_TOKEN_REDIRECT_URI }}
            VITE_INTERNAL_HOOK_SECRET=${{ secrets.VITE_INTERNAL_HOOK_SECRET }}
