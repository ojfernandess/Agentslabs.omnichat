# Stack sugerida para Easypanel / Docker Compose (mesmo servidor, estilo Chatwoot).
#
# ⚠️ ESTE FICHEIRO ESTÁ EM deploy/ — USA `context: ..` (pai = raiz do repo).
#    NÃO o copie para `docker-compose.yml` na raiz sem trocar para `context: .` e
#    `dockerfile: Dockerfile` — isso causa "open Dockerfile: no such file" no Easypanel.
#    No painel use o compose na RAIZ: `docker-compose.yml` ou `docker-compose.easypanel.yml`.
#
# Repositório Git (clone / integração CI):
#   https://github.com/ojfernandess/Agentslabs.omnichat
#   branch padrão: main
#
# No Easypanel: prefira o ficheiro na RAIZ do repo: ../docker-compose.easypanel.yml
# (context: . e Dockerfile na raiz). Este ficheiro em deploy/ usa context: .. e pode falhar
# se o painel não resolver caminhos relativos ao subdiretório deploy/.
#
# Criar app → Docker Compose (ou Build a partir de Git) e apontar para o URL acima.
# Imagem publicada pelo GitHub Actions (GHCR): ver deploy/EASYPANEL_GITHUB.md e o separador Packages do repositório.
#
# Serviços:
#   - web: SPA (Nginx) — Dockerfile na raiz ou deploy/Dockerfile
#   - db-init: one-shot — aplica supabase/migrations (requer DATABASE_URL com Postgres compatível Supabase)
#
# As Edge Functions Deno não são substituídas por Node neste repositório: em modo "local"
# deve usar uma das opções documentadas em docs/DEPLOYMENT_ARCHITECTURE.md (Supabase self-hosted,
# edge-runtime, ou proxy para o mesmo URL pattern).
#
# Uso na raiz do clone (recomendado):
#   docker compose -f docker-compose.easypanel.yml --env-file .env up -d --build
# Alternativa (a partir da pasta deploy):
#   docker compose -f deploy/docker-compose.easypanel.yml --env-file .env up -d --build
#
# Variáveis: deploy/easypanel.env.example, .env.example e deploy/EASYPANEL_GITHUB.md
#
# Easypanel: defina no projeto as variáveis abaixo (Environment / Build).
# Não use ${VAR:?} aqui — o painel nem sempre exporta variáveis antes do parse do Compose (erro "missing a value").
# Valores vazios embutem SPA sem Supabase: confirme URL e anon key antes do deploy.

services:
  web:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY:-}
        VITE_SUPABASE_FUNCTIONS_URL: ${VITE_SUPABASE_FUNCTIONS_URL:-}
        VITE_DEPLOYMENT_MODE: ${VITE_DEPLOYMENT_MODE:-easypanel}
        META_APP_ID: ${META_APP_ID:-}
        VITE_PUBLIC_APP_URL: ${VITE_PUBLIC_APP_URL:-}
        VITE_INTERNAL_HOOK_SECRET: ${VITE_INTERNAL_HOOK_SECRET:-}
        VITE_EXTERNAL_MEDIA_STORAGE: ${VITE_EXTERNAL_MEDIA_STORAGE:-}
        VITE_EXTERNAL_MEDIA_UPLOAD_URL: ${VITE_EXTERNAL_MEDIA_UPLOAD_URL:-}
    expose:
      - "80"
    labels:
      org.opencontainers.image.source: "https://github.com/ojfernandess/Agentslabs.omnichat"
      org.opencontainers.image.title: "Agentslabs Omni Chat"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Executar uma vez após Postgres disponível (ou usar job no Easypanel)
  db-init:
    profiles:
      - migrate
    build:
      context: ..
      dockerfile: Dockerfile.db-init
    environment:
      DATABASE_URL: ${DATABASE_URL:-}
    restart: "no"
