# Apenas o frontend (SPA) — Supabase já existe noutro host (Cloud ou self-hosted).
# Este ficheiro inclui deploy/docker-compose.yml (mesmo serviço `web`).
#
# Uso na raiz do repositório:
#   cp .env.example .env   # preencher VITE_SUPABASE_URL, VITE_SUPABASE_PUBLISHABLE_KEY, etc.
#   docker compose -f deploy/docker-compose.frontend-only.yml --env-file .env up -d --build
#
# Porta: WEB_PORT (default 8080) → http://localhost:8080

include:
  - path: docker-compose.yml
